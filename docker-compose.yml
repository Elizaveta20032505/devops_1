services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops1-api:latest
    container_name: devops1-api
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5)"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
